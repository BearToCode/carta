name: Code Quality

on: [push, pull_request]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm i

      - name: Build project
        run: pnpm run build

      - name: Build docs
        run: pnpm run build
        working-directory: ./docs

      - name: Run lint
        run: pnpm run lint

      - name: Run check
        run: pnpm run check
